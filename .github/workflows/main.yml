name: CI Tests

on:
  - push
  - pull_request

jobs:
  test-node:
    name: Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 22, 24, 25 ]
        os:
          - ubuntu-latest
          - macos-latest
         # - windows-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: yarn install --ignore-engines
      - name: Code quality
        run: yarn biome ci .
      - name: Test
        run: yarn test

  test-bun:
    name: Bun on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Test
        run: bun run test
